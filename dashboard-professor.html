<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dashboard · Hellora Consultoria</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap');

  :root {
    --cream: #F7F5F2;
    --offwhite: #FDFCFB;
    --purple-light: #E8E0F0;
    --purple-mid: #C4A8D8;
    --purple: #9B72BB;
    --purple-dark: #6D4D8A;
    --green-light: #DFF0E8;
    --green-mid: #A8D4B8;
    --green: #6BB58A;
    --green-dark: #4A8A65;
    --text-dark: #2C2438;
    --text-mid: #6B5F7A;
    --text-light: #A898B8;
    --border: #E8E2EE;
    --shadow: rgba(107,77,138,0.08);
    --red: #E57373;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── PIN ── */
  .pin-screen {
    position: fixed; inset: 0;
    background: var(--cream);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999; padding: 32px 24px;
  }
  .pin-screen.hidden { display: none; }
  .pin-logo { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--purple-dark); margin-bottom: 4px; text-align: center; }
  .pin-sub { font-size: 12px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 36px; text-align: center; }
  .pin-dots { display: flex; gap: 12px; margin-bottom: 28px; }
  .pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border); background: white; transition: all 0.15s; }
  .pin-dot.filled { background: var(--purple); border-color: var(--purple); }
  .pin-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; width: 100%; max-width: 280px; }
  .pin-key {
    padding: 18px; background: var(--offwhite); border: 1.5px solid var(--border);
    border-radius: 14px; font-size: 22px; font-weight: 700; color: var(--text-dark);
    cursor: pointer; font-family: 'Playfair Display', serif;
    transition: all 0.12s; text-align: center;
  }
  .pin-key:active { background: var(--purple-light); border-color: var(--purple-mid); transform: scale(0.96); }
  .pin-key.wide { grid-column: span 2; }
  .pin-err { font-size: 13px; color: var(--red); height: 20px; margin-top: 12px; text-align: center; }

  /* ── HEADER ── */
  .header {
    background: var(--offwhite); border-bottom: 1px solid var(--border);
    padding: 16px 20px; position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--purple-dark); }
  .header-sub { font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 1px; }
  .sync-btn {
    background: var(--purple-light); border: none; border-radius: 10px;
    padding: 8px 14px; color: var(--purple-dark); font-size: 12px;
    font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .sync-btn:active { opacity: 0.8; }

  /* ── CONTENT ── */
  .content { padding: 16px 16px 40px; }

  .status-bar {
    border-radius: 12px; padding: 10px 14px; font-size: 12px;
    margin-bottom: 14px; text-align: center; font-weight: 500;
  }
  .status-bar.loading { background: var(--purple-light); color: var(--purple-dark); }
  .status-bar.ok { background: var(--green-light); color: var(--green-dark); }
  .status-bar.error { background: #FFF0F0; color: var(--red); }

  .section-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-light); font-weight: 600; margin: 16px 0 8px;
  }

  /* ── OVERVIEW GRID ── */
  .overview-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 4px; }
  .ov-card {
    background: var(--offwhite); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 14px 10px; text-align: center;
    cursor: pointer; transition: all 0.15s;
  }
  .ov-card:active { transform: scale(0.97); }
  .ov-card.has-data { border-color: var(--purple-mid); background: var(--purple-light); }
  .ov-card.active-card { border-color: var(--purple); background: var(--purple); }
  .ov-name { font-size: 12px; font-weight: 600; color: var(--text-dark); line-height: 1.2; }
  .ov-card.active-card .ov-name { color: white; }
  .ov-card.has-data .ov-name { color: var(--purple-dark); }
  .ov-dot { font-size: 9px; color: var(--text-light); margin-top: 3px; }
  .ov-card.has-data .ov-dot { color: var(--purple); }
  .ov-card.active-card .ov-dot { color: rgba(255,255,255,0.7); }

  /* ── ALUNO DETAIL ── */
  .aluno-panel { display: none; }
  .aluno-panel.active { display: block; }

  .aluno-header {
    background: linear-gradient(135deg, var(--purple-light), var(--green-light));
    border: 1px solid var(--border); border-radius: 16px;
    padding: 18px; margin-bottom: 12px;
  }
  .aluno-header-name { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--purple-dark); }
  .aluno-header-id { font-size: 11px; color: var(--text-light); margin-top: 2px; }
  .aluno-header-sync { font-size: 11px; color: var(--text-mid); margin-top: 6px; }

  .card {
    background: var(--offwhite); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px; margin-bottom: 10px;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .card-title { font-family: 'Playfair Display', serif; font-size: 14px; color: var(--purple-dark); margin-bottom: 12px; }

  /* SEMANA TABS */
  .week-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; scrollbar-width: none; }
  .week-tabs::-webkit-scrollbar { display: none; }
  .wtab {
    flex-shrink: 0; padding: 6px 12px; border-radius: 20px;
    border: 1.5px solid var(--border); background: var(--offwhite);
    font-size: 12px; font-weight: 500; color: var(--text-light);
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .wtab.has-data { border-color: var(--purple-mid); color: var(--purple-dark); }
  .wtab.active { background: var(--purple); border-color: var(--purple); color: white; }

  /* MÉTRICAS */
  .metric-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .metric-row:last-child { border: none; }
  .metric-name { font-size: 12px; color: var(--text-mid); }
  .metric-right { display: flex; align-items: center; gap: 8px; }
  .metric-val { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--purple-dark); min-width: 24px; text-align: right; }
  .metric-bar-wrap { width: 70px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .metric-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--purple-mid), var(--green-mid)); }

  /* TREINOS */
  .treino-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .treino-row:last-child { border: none; }
  .treino-name { font-size: 13px; font-weight: 500; color: var(--text-dark); }
  .treino-sub { font-size: 11px; color: var(--text-light); margin-top: 2px; }
  .treino-pct { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--purple-dark); }
  .treino-pct.full { color: var(--green-dark); }

  /* CARGAS */
  .carga-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px;
  }
  .carga-row:last-child { border: none; }
  .carga-name { color: var(--text-mid); flex: 1; }
  .carga-val { font-weight: 600; color: var(--purple-dark); }

  .notes-box {
    background: var(--purple-light); border-radius: 10px;
    padding: 10px 12px; font-size: 12px; color: var(--purple-dark);
    line-height: 1.5; font-style: italic; margin-top: 8px;
  }

  .empty-box {
    text-align: center; padding: 24px; color: var(--text-light);
    font-size: 13px; line-height: 1.6;
  }

  .back-btn {
    background: none; border: none; color: var(--purple);
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: 'DM Sans', sans-serif; padding: 0 0 12px 0;
    display: flex; align-items: center; gap: 4px;
  }
</style>
</head>
<body>

<!-- PIN -->
<div class="pin-screen" id="pin-screen">
  <div class="pin-logo">Hellora</div>
  <div class="pin-sub">Dashboard · Professor</div>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
    <div class="pin-dot" id="pd4"></div>
    <div class="pin-dot" id="pd5"></div>
  </div>
  <div class="pin-grid">
    <div class="pin-key" onclick="pinPress('1')">1</div>
    <div class="pin-key" onclick="pinPress('2')">2</div>
    <div class="pin-key" onclick="pinPress('3')">3</div>
    <div class="pin-key" onclick="pinPress('4')">4</div>
    <div class="pin-key" onclick="pinPress('5')">5</div>
    <div class="pin-key" onclick="pinPress('6')">6</div>
    <div class="pin-key" onclick="pinPress('7')">7</div>
    <div class="pin-key" onclick="pinPress('8')">8</div>
    <div class="pin-key" onclick="pinPress('9')">9</div>
    <div class="pin-key" onclick="pinClear()" style="font-size:13px;color:var(--text-light)">Limpar</div>
    <div class="pin-key" onclick="pinPress('0')">0</div>
    <div class="pin-key" onclick="pinBack()" style="font-size:20px">⌫</div>
  </div>
  <div class="pin-err" id="pin-err"></div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="header">
    <div>
      <div class="header-title">Dashboard</div>
      <div class="header-sub">Hellora Consultoria</div>
    </div>
    <button class="sync-btn" onclick="loadAll()">↻ Atualizar</button>
  </div>

  <div class="content">
    <div id="status-bar" class="status-bar loading">⏳ Carregando dados...</div>

    <!-- OVERVIEW -->
    <div class="section-label">Todos os Alunos</div>
    <div class="overview-grid" id="overview-grid"></div>

    <!-- ALUNO DETAIL -->
    <div id="aluno-detail"></div>
  </div>
</div>

<script>
const FIREBASE_URL = 'https://helloradana-consultoria-default-rtdb.firebaseio.com';
const PIN = '210115';

const ALUNOS = [
  { id: 'diego-abadia',   nome: 'Diego' },
  { id: 'jessica-silva',  nome: 'Jessica' },
  { id: 'stephanie',      nome: 'Stephanie' },
  { id: 'julia',          nome: 'Júlia' },
  { id: 'beatriz',        nome: 'Beatriz' },
  { id: 'jamyle',         nome: 'Jamyle' },
  { id: 'mayara',         nome: 'Mayara' },
  { id: 'arlen',          nome: 'Arlen' },
  { id: 'zion',           nome: 'Zion' },
  { id: 'laura',          nome: 'Laura' },
  { id: 'sabrina-macedo', nome: 'Sabrina' },
  { id: 'rafaela',        nome: 'Rafaela' },
  { id: 'leonardo',       nome: 'Leonardo' },
  { id: 'bianca',         nome: 'Bianca' },
];

const METRICS = [
  { key: 'freq',  label: 'Frequência' },
  { key: 'humor', label: 'Humor' },
  { key: 'energia', label: 'Energia' },
  { key: 'dific', label: 'Dificuldade' },
  { key: 'dor',   label: 'Dor / Desconforto' },
  { key: 'sono',  label: 'Sono' },
  { key: 'alim',  label: 'Alimentação' },
];

// ── PIN ──
let pinBuf = '';

function pinPress(d) {
  if (pinBuf.length >= 6) return;
  pinBuf += d;
  updateDots();
  if (pinBuf.length === 6) setTimeout(checkPin, 150);
}
function pinBack() { pinBuf = pinBuf.slice(0,-1); updateDots(); }
function pinClear() { pinBuf = ''; updateDots(); }
function updateDots() {
  for (let i=0;i<6;i++)
    document.getElementById('pd'+i).classList.toggle('filled', i < pinBuf.length);
}
function checkPin() {
  if (pinBuf === PIN) {
    document.getElementById('pin-screen').classList.add('hidden');
    document.getElementById('app').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('pin-err').textContent = 'PIN incorreto. Tente novamente.';
    pinBuf = ''; updateDots();
  }
}

// ── DATA ──
let allData = {};
let activeAluno = null;
let activeWeek = null;

async function loadAll() {
  setStatus('loading', '⏳ Carregando dados de todos os alunos...');
  allData = {};
  const promises = ALUNOS.map(async a => {
    try {
      const res = await fetch(`${FIREBASE_URL}/alunos/${a.id}/state.json`);
      if (res.ok) {
        const d = await res.json();
        if (d) allData[a.id] = d;
      }
    } catch(e) {}
  });
  await Promise.all(promises);
  const count = Object.keys(allData).length;
  setStatus('ok', `✅ ${count} aluno(s) com dados · ${new Date().toLocaleTimeString('pt-BR')}`);
  renderOverview();
  if (activeAluno) renderAluno(activeAluno);
}

function setStatus(type, msg) {
  const el = document.getElementById('status-bar');
  el.className = 'status-bar ' + (type === 'ok' ? 'ok' : type === 'error' ? 'error' : 'loading');
  el.textContent = msg;
}

// ── OVERVIEW ──
function renderOverview() {
  const grid = document.getElementById('overview-grid');
  grid.innerHTML = ALUNOS.map(a => {
    const hasData = !!allData[a.id];
    const isActive = activeAluno === a.id;
    const upd = hasData && allData[a.id]._updated
      ? new Date(allData[a.id]._updated).toLocaleDateString('pt-BR')
      : null;
    return `<div class="ov-card ${hasData?'has-data':''} ${isActive?'active-card':''}" onclick="selectAluno('${a.id}')">
      <div class="ov-name">${a.nome}</div>
      <div class="ov-dot">${upd ? upd : 'sem dados'}</div>
    </div>`;
  }).join('');
}

// ── ALUNO DETAIL ──
function selectAluno(id) {
  activeAluno = id;
  activeWeek = null;
  renderOverview();
  renderAluno(id);
  document.getElementById('aluno-detail').scrollIntoView({ behavior: 'smooth' });
}

function renderAluno(id) {
  const a = ALUNOS.find(x => x.id === id);
  const data = allData[id];
  const detail = document.getElementById('aluno-detail');

  if (!data) {
    detail.innerHTML = `
      <div class="section-label">${a.nome}</div>
      <div class="card"><div class="empty-box">Nenhum dado registrado ainda para ${a.nome}.</div></div>`;
    return;
  }

  const upd = data._updated ? new Date(data._updated).toLocaleString('pt-BR') : '—';

  // Find weeks with data — support both eval-w1 (Diego style) and w1 (Jessica style)
  const evalWeeks = [];
  for (let w=1; w<=20; w++) {
    if (data[`eval-w${w}`] || data[`w${w}`]?.eval) evalWeeks.push(w);
  }

  // Find treino weeks
  const treinoWeeks = [];
  for (let w=1; w<=20; w++) {
    const hasTreino = checkHasTreino(data, w);
    if (hasTreino) treinoWeeks.push(w);
  }

  const allWeeks = [...new Set([...evalWeeks, ...treinoWeeks])].sort((a,b)=>a-b);

  let html = `
  <div class="section-label" style="margin-top:16px">${a.nome} · Progresso</div>
  <div class="aluno-header">
    <div class="aluno-header-name">${a.nome}</div>
    <div class="aluno-header-id">${a.id}</div>
    <div class="aluno-header-sync">Última atualização: ${upd}</div>
  </div>`;

  if (!allWeeks.length) {
    html += `<div class="card"><div class="empty-box">Nenhuma semana preenchida ainda.</div></div>`;
    detail.innerHTML = html;
    return;
  }

  // Week tabs
  if (!activeWeek || !allWeeks.includes(activeWeek)) activeWeek = allWeeks[allWeeks.length - 1];

  html += `<div class="week-tabs" id="week-tabs-${id}">`;
  for (let w=1; w<=20; w++) {
    const has = allWeeks.includes(w);
    html += `<div class="wtab ${has?'has-data':''} ${activeWeek===w?'active':''}" onclick="selectWeek('${id}',${w})">${w}</div>`;
  }
  html += `</div>`;

  // Week panel
  html += buildWeekPanel(id, data, activeWeek);

  detail.innerHTML = html;
}

function selectWeek(id, w) {
  activeWeek = w;
  renderAluno(id);
  // scroll tabs
  setTimeout(() => {
    const tab = document.querySelector(`.wtab.active`);
    if (tab) tab.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
  }, 50);
}

function buildWeekPanel(id, data, w) {
  let html = '';

  // Get eval — support both formats
  const evalData = data[`eval-w${w}`] || data[`w${w}`]?.eval || null;

  // AVALIAÇÃO
  html += `<div class="card"><div class="card-title">📊 Avaliação — Semana ${w}</div>`;
  if (evalData) {
    for (const m of METRICS) {
      const val = evalData[m.key];
      if (!val) continue;
      // val can be number (1-5) or string (old format)
      const isNum = typeof val === 'number' || (typeof val === 'string' && !isNaN(val));
      const numVal = isNum ? parseFloat(val) : null;
      html += `<div class="metric-row">
        <span class="metric-name">${m.label}</span>
        <div class="metric-right">
          ${numVal ? `<div class="metric-bar-wrap"><div class="metric-bar" style="width:${numVal*20}%"></div></div>` : ''}
          <span class="metric-val">${val}</span>
        </div>
      </div>`;
    }
    if (evalData.obs || evalData.notes) {
      html += `<div class="notes-box">"${evalData.obs || evalData.notes}"</div>`;
    }
  } else {
    html += `<div class="empty-box" style="padding:16px">Avaliação não preenchida nesta semana.</div>`;
  }
  html += `</div>`;

  // TREINOS
  html += `<div class="card"><div class="card-title">💪 Treinos — Semana ${w}</div>`;
  const treinoInfo = getTreinoInfo(data, w);
  if (treinoInfo.length) {
    for (const t of treinoInfo) {
      html += `<div class="treino-row">
        <div>
          <div class="treino-name">${t.label}</div>
          <div class="treino-sub">${t.done}/${t.total} exercícios</div>
        </div>
        <div class="treino-pct ${t.done===t.total?'full':''}">${Math.round(t.done/t.total*100)}%</div>
      </div>`;
    }
  } else {
    html += `<div class="empty-box" style="padding:16px">Nenhum treino registrado nesta semana.</div>`;
  }
  html += `</div>`;

  // CARGAS
  const cargas = getCargas(data, w);
  if (cargas.length) {
    html += `<div class="card"><div class="card-title">🏋️ Cargas — Semana ${w}</div>`;
    for (const c of cargas) {
      html += `<div class="carga-row"><span class="carga-name">${c.name}</span><span class="carga-val">${c.val}kg</span></div>`;
    }
    html += `</div>`;
  }

  return html;
}

// ── HELPERS ──
function checkHasTreino(data, w) {
  // Diego style: keys like "w1-A-ex1" with done:true
  const diegoKeys = Object.keys(data).filter(k => k.startsWith(`w${w}-`) && data[k]?.done);
  if (diegoKeys.length) return true;
  // Jessica/others style: data.w1.A.checks
  const wd = data[`w${w}`];
  if (wd) {
    for (const t of ['A','B','C']) {
      if (wd[t]?.checks && Object.values(wd[t].checks).some(v=>v)) return true;
    }
  }
  return false;
}

function getTreinoInfo(data, w) {
  const result = [];
  // Diego style
  const treinosD = ['A','B','C','D'];
  for (const t of treinosD) {
    const keys = Object.keys(data).filter(k => k.startsWith(`w${w}-${t}-`));
    if (!keys.length) continue;
    const done = keys.filter(k => data[k]?.done).length;
    result.push({ label: `Treino ${t}`, done, total: keys.length });
  }
  if (result.length) return result;
  // Jessica/others style
  const wd = data[`w${w}`];
  if (!wd) return [];
  for (const t of ['A','B','C']) {
    const checks = wd[t]?.checks;
    if (!checks) continue;
    const total = Object.keys(checks).length;
    const done = Object.values(checks).filter(v=>v).length;
    if (total) result.push({ label: `Treino ${t}`, done, total });
  }
  return result;
}

function getCargas(data, w) {
  const result = [];
  // Diego style: keys like w1-A-ex1 with load
  Object.keys(data).forEach(k => {
    if (k.startsWith(`w${w}-`) && data[k]?.load) {
      const parts = k.split('-');
      result.push({ name: parts.slice(2).join(' '), val: data[k].load });
    }
  });
  if (result.length) return result;
  // Jessica/others style
  const wd = data[`w${w}`];
  if (!wd) return [];
  for (const t of ['A','B','C']) {
    const weights = wd[t]?.weights;
    if (!weights) continue;
    Object.entries(weights).forEach(([exId, val]) => {
      result.push({ name: exId.replace(/-/g,' '), val });
    });
  }
  return result;
}
</script>
</body>
</html>
